<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignments - Franciscan Catholic Nursery & Primary School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/admin-dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <div class="sidebar-header">
                <img src="assets/img/logo.jpg" alt="Franciscan Catholic School" class="logo">
                <h3>Student Portal</h3>
            </div>
            <div class="sidebar-menu">
                <ul>
                    <li>
                        <a href="student-dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                    </li>
                    <li>
                        <a href="#report-card" id="report-card-link"><i class="fas fa-id-card"></i> My Report Card</a>
                    </li>
                    <li class="active">
                        <a href="student-assignments.html"><i class="fas fa-book"></i> Assignments</a>
                    </li>
                    <li>
                        <a href="student-messages.html"><i class="fas fa-envelope"></i> Messages</a>
                    </li>
                </ul>
            </div>
            <div class="sidebar-footer">
                <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Top Navigation -->
            <nav class="dashboard-nav">
                <button id="sidebar-toggle" class="mobile-toggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="nav-right">
                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="current-date">Loading...</span>
                    </div>
                    <div class="admin-profile">
                        <div id="student-avatar" style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:white;font-weight:600;font-size:0.9rem;flex-shrink:0"></div>
                        <div class="admin-info">
                            <span id="student-name">Loading...</span>
                            <span id="student-grade">Student</span>
                        </div>
                    </div>
                </div>
            </nav>

            <!-- Page Content -->
            <div class="dashboard-content">
                <div class="page-header">
                    <h1>Assignments</h1>
                    <p>2nd Term &mdash; 2025/2026 Academic Session</p>
                </div>

                <!-- Empty state -->
                <div class="recent-activities">
                    <h3>My Assignments</h3>
                    <div class="activity-list">
                        <div class="empty-state" style="padding:60px 20px;text-align:center">
                            <i class="fas fa-book-open" style="font-size:3rem;color:#ddd;margin-bottom:16px;display:block"></i>
                            <h4 style="color:#555;margin:0 0 8px">No Assignments Yet</h4>
                            <p style="color:#999;margin:0">Assignments will appear here once your teacher publishes them for this term.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/student-dashboard.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const u = JSON.parse(localStorage.getItem('currentUser')) || JSON.parse(sessionStorage.getItem('currentUser'));
        if (!u || u.role !== 'student') { window.location.href = 'portal.html'; return; }
        const initials = (u.name || u.full_name || 'S').split(' ').filter(Boolean).map(w => w[0]).join('').substring(0,2).toUpperCase();
        document.getElementById('student-name').textContent = u.name || u.full_name || u.username;
        document.getElementById('student-grade').textContent = u.class_name || 'Student';
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
        setStudentAvatar(document.getElementById('student-avatar'), u, initials);
        document.getElementById('logout-btn')?.addEventListener('click', e => {
            e.preventDefault();
            ['currentUser','authToken'].forEach(k => { localStorage.removeItem(k); sessionStorage.removeItem(k); });
            window.location.href = 'portal.html';
        });
        const sidebar = document.querySelector('.dashboard-sidebar');
        document.getElementById('sidebar-toggle')?.addEventListener('click', e => { sidebar.classList.toggle('active'); e.stopPropagation(); });
        document.addEventListener('click', e => { if (sidebar.classList.contains('active') && !sidebar.contains(e.target)) sidebar.classList.remove('active'); });
        document.getElementById('report-card-link')?.addEventListener('click', e => { e.preventDefault(); openStudentReportCard(u); });
    });
    </script>
</body>
</html>

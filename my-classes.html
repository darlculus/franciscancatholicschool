<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Classes - Franciscan Catholic Nursery and Primary School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/admin-dashboard.css" />
    <link rel="stylesheet" href="assets/css/my-classes.css" />
  </head>
  <body>
    <div class="dashboard-container">
      <!-- Sidebar -->
      <aside class="dashboard-sidebar">
        <div class="sidebar-header">
          <img src="assets/img/logo.jpg" alt="Franciscan Catholic School" class="logo" />
          <h3>Teacher Portal</h3>
        </div>
        <div class="sidebar-menu">
          <ul>
            <li><a href="teacher-dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li class="active"><a href="my-classes.html"><i class="fas fa-users"></i> My Classes</a></li>
            <li><a href="assignments.html"><i class="fas fa-book"></i> Assignments</a></li>
            <li><a href="attendance.html"><i class="fas fa-calendar-check"></i> Attendance</a></li>
            <li><a href="teacher-messages.html"><i class="fas fa-envelope"></i> Messages</a></li>
            <li><a href="teacher-settings.html"><i class="fas fa-cog"></i> Settings</a></li>
          </ul>
        </div>
        <div class="sidebar-footer">
          <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="dashboard-main">
        <nav class="dashboard-nav">
          <button id="sidebar-toggle" class="mobile-toggle"><i class="fas fa-bars"></i></button>
          <div class="nav-right">
            <div class="date-display"><i class="far fa-calendar-alt"></i><span id="current-date">Loading...</span></div>
            <div class="admin-profile">
              <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:white;font-weight:600;font-size:0.9rem;" id="nav-avatar"></div>
              <div class="admin-info"><span id="nav-name">Loading...</span><span id="nav-role">Teacher</span></div>
            </div>
          </div>
        </nav>

        <div class="dashboard-content">
          <div class="page-header">
            <h1>My Classes</h1>
            <p>Your assigned class and students</p>
          </div>

          <!-- Stats -->
          <div class="classes-overview">
            <div class="overview-card">
              <div class="overview-icon"><i class="fas fa-school"></i></div>
              <div class="overview-info"><h3 id="total-classes">0</h3><p>My Classes</p></div>
            </div>
            <div class="overview-card">
              <div class="overview-icon"><i class="fas fa-user-graduate"></i></div>
              <div class="overview-info"><h3 id="total-students">0</h3><p>Total Students</p></div>
            </div>
          </div>

          <!-- Class card rendered by JS -->
          <div id="classes-grid" class="classes-grid">
            <div style="grid-column:1/-1;text-align:center;padding:40px;color:#999">
              <i class="fas fa-spinner fa-spin" style="font-size:2rem"></i>
              <p style="margin-top:10px">Loading your class...</p>
            </div>
          </div>

          <!-- Students list rendered by JS -->
          <div class="upcoming-classes">
            <div class="section-header">
              <h2>Students in My Class</h2>
            </div>
            <div id="students-list-section">
              <p style="color:#999;padding:20px 0">Loading students...</p>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="assets/js/teacher-nav.js"></script>
    <script src="assets/js/my-classes.js"></script>
  </body>
</html>

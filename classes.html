<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classes - Franciscan Catholic Nursery & Primary School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/admin-dashboard.css">
    <link rel="stylesheet" href="assets/css/classes.css">
</head>
<body>
<div class="dashboard-container">
    <aside class="dashboard-sidebar">
        <div class="sidebar-header">
            <img src="assets/img/logo.jpg" alt="Franciscan Catholic School" class="logo">
            <h3>Admin Portal</h3>
        </div>
        <div class="sidebar-menu">
            <ul>
                <li><a href="admin-dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="teachers.html"><i class="fas fa-chalkboard-teacher"></i> Teachers</a></li>
                <li><a href="students.html"><i class="fas fa-user-graduate"></i> Students</a></li>
                <li class="active"><a href="classes.html"><i class="fas fa-school"></i> Classes</a></li>
                <li><a href="subjects.html"><i class="fas fa-book"></i> Subjects</a></li>
                <li><a href="admin-attendance.html"><i class="fas fa-calendar-check"></i> Attendance</a></li>
                <li><a href="exams.html"><i class="fas fa-file-alt"></i> Exams</a></li>
                <li><a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
            </ul>
        </div>
        <div class="sidebar-footer">
            <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </aside>

    <main class="dashboard-main">
        <nav class="dashboard-nav">
            <button id="sidebar-toggle" class="mobile-toggle"><i class="fas fa-bars"></i></button>
            <div class="nav-right">
                <div class="date-display">
                    <i class="far fa-calendar-alt"></i>
                    <span id="current-date">Loading...</span>
                </div>
                <div class="admin-profile">
                    <img src="assets/img/sister3.jpg" alt="Admin" class="avatar">
                    <div class="admin-info">
                        <span id="admin-name">Loading...</span>
                        <span id="admin-role">Administrator</span>
                    </div>
                </div>
            </div>
        </nav>

        <div class="dashboard-content">
            <div class="page-header">
                <h1>Classes</h1>
                <p>Manage classes and assign class teachers</p>
            </div>

            <div id="classes-grid" class="classes-grid">
                <div class="loading-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading classes...</p>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Assign Teacher Modal -->
<div id="assign-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h2>Assign Class Teacher</h2>
        <p id="assign-modal-class-name" style="font-weight:600; margin-bottom:1rem;"></p>
        <input type="hidden" id="assign-class-id">
        <input type="hidden" id="assign-class-key">
        <div class="form-group">
            <label for="teacher-select">Select Teacher</label>
            <select id="teacher-select">
                <option value="">-- No teacher assigned --</option>
            </select>
        </div>
        <div class="form-actions">
            <button class="btn-primary" id="confirm-assign-btn">Save</button>
            <button class="btn-secondary cancel-modal">Cancel</button>
        </div>
    </div>
</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/admin-nav.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async function () {
    let teachers = [];

    // Load teachers for the dropdown
    try {
        const res = await fetch('/api/teachers', { headers: { Authorization: 'Bearer x' } });
        const data = await res.json();
        teachers = data.teachers || [];
    } catch (e) { console.warn('Could not load teachers', e); }

    // Load classes
    async function loadClasses() {
        const grid = document.getElementById('classes-grid');
        try {
            const res = await fetch('/api/classes');
            const data = await res.json();
            renderClasses(data.classes || []);
        } catch (e) {
            grid.innerHTML = '<p style="color:red">Failed to load classes. Please refresh.</p>';
        }
    }

    function renderClasses(classes) {
        const grid = document.getElementById('classes-grid');
        if (!classes.length) {
            grid.innerHTML = '<p>No classes found. Please run the Supabase setup SQL.</p>';
            return;
        }
        grid.innerHTML = classes.map(cls => `
            <div class="class-card">
                <div class="class-card-header" style="background-color:${cls.color || '#4CAF50'}">
                    <i class="fas fa-school"></i>
                    <h3>${cls.name}</h3>
                </div>
                <div class="class-card-body">
                    <div class="class-detail">
                        <i class="fas fa-chalkboard-teacher"></i>
                        <span>${cls.teacher_name || '<em>No teacher assigned</em>'}</span>
                    </div>
                    <div class="class-detail">
                        <i class="fas fa-users"></i>
                        <span>Capacity: ${cls.capacity || 30}</span>
                    </div>
                    <button class="btn-primary assign-btn"
                        data-id="${cls.id}"
                        data-key="${cls.class_key}"
                        data-name="${cls.name}"
                        data-teacher="${cls.teacher_id || ''}">
                        <i class="fas fa-user-plus"></i>
                        ${cls.teacher_name ? 'Change Teacher' : 'Assign Teacher'}
                    </button>
                    <button class="btn-secondary view-class-btn" style="margin-top:8px;width:100%"
                        data-key="${cls.class_key}"
                        data-name="${cls.name}">
                        <i class="fas fa-eye"></i> View Class
                    </button>
                </div>
            </div>
        `).join('');
    }

    // Open view class modal
    document.getElementById('classes-grid').addEventListener('click', async function (e) {
        const viewBtn = e.target.closest('.view-class-btn');
        if (!viewBtn) return;
        const classKey = viewBtn.dataset.key;
        const className = viewBtn.dataset.name;
        await openViewClassModal(classKey, className);
    });

    async function openViewClassModal(classKey, className) {
        const existing = document.getElementById('view-class-modal');
        if (existing) existing.remove();

        const modal = document.createElement('div');
        modal.id = 'view-class-modal';
        modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px';
        modal.innerHTML = `
            <div style="background:#fff;border-radius:10px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;padding:28px;position:relative">
                <button id="vcm-close" style="position:absolute;top:14px;right:16px;background:none;border:none;font-size:1.4rem;cursor:pointer;color:#999">&times;</button>
                <h2 style="margin:0 0 4px">${className}</h2>
                <p style="margin:0 0 18px;color:#888;font-size:0.88rem">2nd Term &mdash; 2025/2026</p>
                <div id="vcm-body"><i class="fas fa-spinner fa-spin"></i> Loading students...</div>
            </div>`;
        modal.querySelector('#vcm-close').onclick = () => modal.remove();
        modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
        document.body.appendChild(modal);

        try {
            const res = await fetch(`/api/students?class_key=${classKey}`);
            const data = await res.json();
            const students = data.students || [];
            const body = document.getElementById('vcm-body');

            if (!students.length) {
                body.innerHTML = '<p style="color:#aaa;text-align:center;padding:30px 0">No students enrolled in this class yet.</p>';
                return;
            }

            const GRADING = [
                { min:75, grade:'A', label:'Excellent' },
                { min:60, grade:'B', label:'Very Good' },
                { min:50, grade:'C', label:'Good' },
                { min:40, grade:'D', label:'Fair' },
                { min:0,  grade:'F', label:'Fail' }
            ];
            const getGrade = score => GRADING.find(g => score >= g.min) || { grade:'—', label:'—' };

            body.innerHTML = `
                <table style="width:100%;border-collapse:collapse;font-size:0.88rem">
                    <thead>
                        <tr style="background:#f5f6fa">
                            <th style="padding:10px;text-align:left;border-bottom:2px solid #eee">#</th>
                            <th style="padding:10px;text-align:left;border-bottom:2px solid #eee">Student</th>
                            <th style="padding:10px;text-align:center;border-bottom:2px solid #eee">Result</th>
                            <th style="padding:10px;text-align:center;border-bottom:2px solid #eee">Head Comment</th>
                            <th style="padding:10px;text-align:center;border-bottom:2px solid #eee">Published</th>
                            <th style="padding:10px;text-align:center;border-bottom:2px solid #eee">Report Card</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${students.map((s, i) => {
                            const result = (typeof s.result === 'object' && s.result) ? s.result : {};
                            const subjects = Array.isArray(s.subjects) ? s.subjects : Object.keys(result).filter(k => !['psd','teacher_comment','head_comment'].includes(k));
                            const scores = subjects.map(subj => result[subj]?.total).filter(t => t !== null && t !== undefined);
                            const avg = scores.length ? Math.round(scores.reduce((a,b) => a+b, 0) / scores.length) : null;
                            const { grade } = avg !== null ? getGrade(avg) : { grade: '—' };
                            const hasComment = !!result.head_comment;
                            const isPublished = !!s.result_published;
                            const fullName = [s.first_name, s.middle_name, s.last_name].filter(Boolean).join(' ');
                            return `
                            <tr style="border-bottom:1px solid #f5f5f5">
                                <td style="padding:10px">${i+1}</td>
                                <td style="padding:10px">
                                    <div style="display:flex;align-items:center;gap:8px">
                                        <div style="width:32px;height:32px;border-radius:50%;overflow:hidden;background:#f0f0f0;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                                            ${s.photo_url ? `<img src="${s.photo_url}" style="width:100%;height:100%;object-fit:cover">` : '<i class="fas fa-user" style="color:#bbb;font-size:0.9rem"></i>'}
                                        </div>
                                        <span>${fullName}</span>
                                    </div>
                                </td>
                                <td style="padding:10px;text-align:center">
                                    ${avg !== null ? `<span style="font-weight:700;color:#1a237e">${avg}%</span> <span style="font-size:0.78rem;color:#888">(${grade})</span>` : '<span style="color:#bbb">No result</span>'}
                                </td>
                                <td style="padding:10px;text-align:center">
                                    <span style="color:${hasComment ? '#2e7d32' : '#f57f17'};font-size:0.82rem">${hasComment ? '✓ Added' : '✗ Missing'}</span>
                                </td>
                                <td style="padding:10px;text-align:center">
                                    <span style="color:${isPublished ? '#2e7d32' : '#bbb'};font-size:0.82rem">${isPublished ? '✓ Yes' : '—'}</span>
                                </td>
                                <td style="padding:10px;text-align:center">
                                    <a href="report-card.html?id=${s.id}&class_key=${classKey}&term=${encodeURIComponent('2nd Term')}&session=${encodeURIComponent('2025/2026')}" target="_blank"
                                        style="color:#5c6bc0;font-size:0.82rem;text-decoration:none">
                                        <i class="fas fa-external-link-alt"></i> View
                                    </a>
                                </td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>`;
        } catch (err) {
            document.getElementById('vcm-body').innerHTML = '<p style="color:red">Failed to load students.</p>';
        }
    }

    // Open assign modal
    document.getElementById('classes-grid').addEventListener('click', function (e) {
        const btn = e.target.closest('.assign-btn');
        if (!btn) return;

        document.getElementById('assign-class-id').value = btn.dataset.id;
        document.getElementById('assign-class-key').value = btn.dataset.key;
        document.getElementById('assign-modal-class-name').textContent = btn.dataset.name;

        const select = document.getElementById('teacher-select');
        select.innerHTML = '<option value="">-- No teacher assigned --</option>' +
            teachers.map(t => `<option value="${t.teacher_id}" ${t.teacher_id === btn.dataset.teacher ? 'selected' : ''}>${t.full_name}</option>`).join('');

        document.getElementById('assign-modal').classList.add('active');
    });

    // Save assignment
    document.getElementById('confirm-assign-btn').addEventListener('click', async function () {
        const classId = document.getElementById('assign-class-id').value;
        const select = document.getElementById('teacher-select');
        const teacherId = select.value;
        const teacherName = teacherId ? select.options[select.selectedIndex].text : null;

        try {
            const res = await fetch('/api/classes', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', Authorization: 'Bearer x' },
                body: JSON.stringify({ class_id: classId, teacher_id: teacherId || null, teacher_name: teacherName })
            });
            if (!res.ok) throw new Error('Save failed');
            document.getElementById('assign-modal').classList.remove('active');
            loadClasses();
            showToast('Teacher assigned successfully!');
        } catch (e) {
            showToast('Failed to save. Please try again.', 'error');
        }
    });

    // Modal close
    document.querySelectorAll('.close-modal, .cancel-modal').forEach(el => {
        el.addEventListener('click', () => document.getElementById('assign-modal').classList.remove('active'));
    });

    function showToast(msg, type = 'success') {
        const t = document.createElement('div');
        t.className = `notification notification-${type}`;
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.classList.add('show'), 10);
        setTimeout(() => t.remove(), 3500);
    }

    loadClasses();
});
</script>
</body>
</html>

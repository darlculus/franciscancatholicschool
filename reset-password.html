<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Franciscan Catholic School</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/franciscan.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#f5f0eb; font-family:'Montserrat',sans-serif; }
    .card { background:#fff; border-radius:12px; padding:2.5rem; width:90%; max-width:420px; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
    .card h2 { color:#8B4513; margin-bottom:0.5rem; }
    .card p { color:#666; font-size:0.9rem; margin-bottom:1.5rem; }
    .form-group { margin-bottom:1rem; }
    label { display:block; margin-bottom:0.3rem; font-size:0.9rem; font-weight:500; }
    input { width:100%; padding:0.65rem; border:1px solid #ccc; border-radius:6px; font-size:0.95rem; box-sizing:border-box; }
    button { width:100%; padding:0.75rem; background:#8B4513; color:#fff; border:none; border-radius:6px; font-size:1rem; cursor:pointer; margin-top:0.5rem; }
    button:hover { background:#7a3b10; }
    #msg { display:none; padding:0.75rem; border-radius:6px; font-size:0.9rem; margin-bottom:1rem; }
    .logo { text-align:center; margin-bottom:1.5rem; }
    .logo img { width:70px; border-radius:50%; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><img src="assets/img/logo.jpg" alt="Logo" /></div>
    <h2>Set New Password</h2>
    <p>Enter your new password below.</p>
    <div id="msg"></div>
    <div class="form-group">
      <label for="new-password">New Password</label>
      <input type="password" id="new-password" placeholder="At least 6 characters" />
    </div>
    <div class="form-group">
      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="Repeat new password" />
    </div>
    <button onclick="submitReset()">Reset Password</button>
  </div>

  <script>
    const API = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : '/api';
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      showMsg('Invalid or missing reset token. Please request a new link.', 'error');
    }

    async function submitReset() {
      const newPassword = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (!newPassword || newPassword.length < 6) return showMsg('Password must be at least 6 characters.', 'error');
      if (newPassword !== confirm) return showMsg('Passwords do not match.', 'error');

      try {
        const res = await fetch(`${API}/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          showMsg(data.message + ' Redirecting to login...', 'success');
          setTimeout(() => window.location.href = 'portal.html', 3000);
        } else {
          showMsg(data.error || 'Something went wrong.', 'error');
        }
      } catch {
        showMsg('Could not reach the server. Please try again.', 'error');
      }
    }

    function showMsg(msg, type) {
      const el = document.getElementById('msg');
      el.textContent = msg;
      el.style.display = 'block';
      el.style.background = type === 'success' ? '#d4edda' : '#f8d7da';
      el.style.color = type === 'success' ? '#155724' : '#721c24';
    }
  </script>
</body>
</html>
